name: ${INSTANCE_NAME:-acai}

# Caddy removed: this stack is fronted by your own external Caddy.
# Your Caddy reaches `app` over a shared external Docker network (see `networks:` below),
# so no host ports are published for app. In your Caddy config:
#
#   acai.example.com {
#       encode gzip
#       reverse_proxy acai-app:4000
#   }
#
# (Your Caddy container must be attached to the same external network.)

services:
  db:
    # https://hub.docker.com/_/postgres
    image: postgres:17.9
    restart: unless-stopped
    shm_size: 3gb
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=5GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-acai_prod}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-acai_prod}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # Optional. Needs RESTIC_* / AWS_* env to actually push backups.
  # Comment out the whole service for a first boot if you haven't set up S3 yet.
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps | grep '[c]rond' || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
    environment:
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 0 * * *}
      POSTGRES_DB: ${POSTGRES_DB:-acai_prod}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      # pgsql client expects PGPASSWORD and not POSTGRES_PASSWORD
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      RESTIC_CACHE_DIR: ${RESTIC_CACHE_DIR:-/var/backups/restic/cache}
      RESTIC_LOCAL_REPO: ${RESTIC_LOCAL_REPO:-/var/backups/restic/local}
      RESTIC_REMOTE_REPO: ${RESTIC_REMOTE_REPO:-s3:nbg1.your-objectstorage.com/acai-prod}
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-nbg1}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      BACKUP_HEARTBEAT_URL: ${BACKUP_HEARTBEAT_URL:-}
    volumes:
      - backup_data:/var/backups
    entrypoint: ["/opt/backup/entrypoint.sh"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M

  app:
    # --- Image source: pick ONE ---
    # (A) Build from your fork (default). Context is the repo root (one level up from infra/).
    build:
      context: ..
      dockerfile: infra/app/Dockerfile
      target: prod
    # (B) Pull a prebuilt image you pushed to your own registry. If you use this,
    #     delete the `build:` block above, uncomment the two lines below, set
    #     IMAGE_TAG_VERSION, and add the registry credentials in Portainer.
    # image: ghcr.io/<your-user>/server:${IMAGE_TAG_VERSION:-latest}
    # pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "ecto://${POSTGRES_USER:-}:${POSTGRES_PASSWORD:-}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-acai_prod}"
      # email-delivery.SMTP.3
      SMTP_RELAY: ${SMTP_RELAY:-smtp.example.com}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SSL: ${SMTP_SSL:-false}
      SMTP_TLS: ${SMTP_TLS:-always}
      SMTP_CACERTFILE: ${SMTP_CACERTFILE:-/etc/ssl/certs/ca-certificates.crt}
      SMTP_AUTH: ${SMTP_AUTH:-always}
      SMTP_RETRIES: ${SMTP_RETRIES:-2}
      SMTP_NO_MX_LOOKUPS: ${SMTP_NO_MX_LOOKUPS:-true}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-acai.sh}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-noreply@acai.sh}
      MIX_ENV: prod
      PHX_PORT: ${PHX_PORT:-4000}
      PLAUSIBLE_SRC: ${PLAUSIBLE_SRC:-}
      POOL_SIZE: ${POOL_SIZE:-10}
      POSTGRES_DB: ${POSTGRES_DB:-acai_prod}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_USER: ${POSTGRES_USER:-}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-}
      START_SERVER: true
      # These drive URL generation only; set them to what your external Caddy serves.
      URL_HOST: ${URL_HOST:-app.acai.sh}
      URL_PATH: /
      URL_PORT: ${URL_PORT:-443}
      URL_SCHEME: ${URL_SCHEME:-https}
    # Reachable by your Caddy as `acai-app:4000` over the shared network.
    networks:
      default: {}
      caddy_net:
        aliases:
          - acai-app
    # Optional: only needed if you run infra/app/upgrade-app.sh from the host,
    # which curls http://localhost:4000/_health. Binds loopback only.
    # ports:
    #     - "127.0.0.1:${APP_HOST_PORT:-4000}:4000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2.5G
        reservations:
          memory: 512M

networks:
  # Internal network for app <-> db <-> backup. Created automatically.
  default: {}
  # Shared network with your existing Caddy stack.
  # Set `name:` to your actual Caddy network (see `docker network ls`),
  # or create one (`docker network create caddy_net`) and attach Caddy to it.
  caddy_net:
    external: true
    name: ${CADDY_NETWORK:-caddy_net}

volumes:
  postgres_data:
  backup_data:
