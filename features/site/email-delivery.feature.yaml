feature:
    name: email-delivery
    product: site
    description: Configures outbound application email delivery.

constraints:
    SMTP:
        name: SMTP delivery requirements
        requirements:
            1: Production outbound email is sent via SMTP instead of Mailgun's HTTP API.
            2: SMTP connection settings are provided through runtime environment variables.
            2-1: The configured SMTP relay is contacted directly by default instead of routing through MX lookup.
            2-2: SMTP TLS peer verification uses a configured CA certificate bundle.
            3: Deployment examples expose SMTP variables and do not require Mailgun variables.
            4: Email delivery failures during registration are handled without crashing the request.
